{{- range $user := .Values.rbac.users }}
{{- range $name, $config := $.Values.components }}
---
kind: Secret
apiVersion: v1
metadata:
  name: cloud-init-{{ $name }}
  namespace: {{ $user }}-application
stringData:
  userdata: |
    #cloud-config
    system_info:
      default_user:
        name: fedora
        plain_text_passwd: fedora
        lock_passwd: false
        sudo: ALL=(ALL) NOPASSWD:ALL
    package_update: false
    package_upgrade: false
    packages:
      - nano
    write_files:
      - path: /etc/containers/systemd/{{ $name }}.container
        content: |
          [Unit]
          Description={{ $name }}
          StartLimitIntervalSec=0
          [Container]
          Image={{ $config.image }}
          ContainerName={{ $name }}
          PublishPort={{ $config.port }}:{{ $config.port }}
          Pull=Always
          {{- range $key, $val := $config.env }}
          Environment="{{ $key }}={{ $val }}"
          {{- end }}
          [Service]
          Restart=always
          RestartSec=5s
          TimeoutStartSec=10
          [Install]
          WantedBy=multi-user.target default.target
    runcmd:
      - setenforce 0
      - sed -i 's/^SELINUX=.*/SELINUX=disabled/' /etc/selinux/config
      - systemctl daemon-reload
      - systemctl start {{ $name }}
      - systemctl enable --now {{ $name }}
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  labels:
    app: {{ $name }}
    kubevirt.io/dynamic-credentials-support: 'true'
    vm.kubevirt.io/template: fedora-server-small
    vm.kubevirt.io/template.namespace: openshift
    vm.kubevirt.io/template.revision: '1'
    vm.kubevirt.io/template.version: v0.34.1
  name: {{ $name }}
  namespace: {{ $user }}-application
spec:
  dataVolumeTemplates:
    - apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        creationTimestamp: null
        name: {{ $name }}
      spec:
        source:
            registry:
              url: "{{ $.Values.images.os }}"
        storage:
          resources:
            requests:
              storage: 5Gi
  runStrategy: RerunOnFailure
  template:
    metadata:
      annotations:
        vm.kubevirt.io/flavor: small
        vm.kubevirt.io/os: fedora
        vm.kubevirt.io/workload: server
      creationTimestamp: null
      labels:
        kubevirt.io/domain: {{ $name }}
        kubevirt.io/size: small
    spec:
      architecture: amd64
      domain:
        cpu:
          cores: 1
          sockets: 1
          threads: 1
        devices:
          disks:
            - disk:
                bus: virtio
              name: rootdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - masquerade: {}
              model: virtio
              name: default
          rng: {}
        features:
          acpi: {}
          smm:
            enabled: true
        firmware:
          bootloader:
            efi: {}
        machine:
          type: pc-q35-rhel9.6.0
        memory:
          guest: 2Gi
        resources: {}
      networks:
        - name: default
          pod: {}
      terminationGracePeriodSeconds: 180
      volumes:
        - dataVolume:
            name: {{ $name }}
          name: rootdisk
        - name: cloudinitdisk
          cloudInitNoCloud:
            secretRef:
              name: cloud-init-{{ $name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $user }}-application
spec:
  selector:
    kubevirt.io/domain: {{ $name }}
  ports:
    - protocol: TCP
      port: {{ $config.port }}
      targetPort: {{ $config.port }}

{{- if $config.createRoute }}
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: route-{{ $name }}
  namespace: {{ $user }}-application
spec:
  to:
    name: {{ $name }}
    weight: 100
    kind: Service
  host: ''
  path: ''
  tls:
    insecureEdgeTerminationPolicy: Redirect
    termination: edge
  port:
    targetPort: {{ $config.port }}
  alternateBackends: []
{{- end }}

{{- end }}
{{- end }}
